version: '3.8'

services:
  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${DB_NAME:-wine_competition}
      - POSTGRES_USER=${DB_USER:-wineuser}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-winepass}

  web:
    build: .
    command: gunicorn --bind 0.0.0.0:8000 wine_project.wsgi:application
    volumes:
      - .:/app
      - static_volume:/app/static_root
      - media_volume:/app/media
    environment:
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - DJANGO_DEBUG=False
      - DJANGO_ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS}
      - DB_NAME=${DB_NAME:-wine_competition}
      - DB_USER=${DB_USER:-wineuser}
      - DB_PASSWORD=${DB_PASSWORD:-winepass}
      - DB_HOST=db
    depends_on:
      - db

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/app/static
      - media_volume:/app/media
    depends_on:
      - web

volumes:
  postgres_data:
  static_volume:
  media_volume:
