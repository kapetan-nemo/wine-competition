{% extends "base.html" %}

{% block title %}Добавить вино{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header">
                    <h4 class="mb-0">Добавить вино в "{{ competition.title }}"</h4>
                </div>
                <div class="card-body">
                    <form method="post" enctype="multipart/form-data">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label">Название вина</label>
                            {{ form.name }}
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Страна происхождения</label>
                            {{ form.country }}
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Картинка (опционально)</label>
                            {{ form.image }}
                        </div>
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-check-circle"></i> Добавить
                            </button>
                            <a href="{% url 'competition_detail' competition.id %}" class="btn btn-outline-secondary">
                                Отмена
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
